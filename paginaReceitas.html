<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>



    <!-- font awesome 5-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />


    <!--css-->

    <style>
        * {
            padding: 0px;
            margin: 0px;
            font-family: "Trebuchet MS", Helvetica, sans-serif;
        }


        /*hero-main */

        .hero-main {
            background-color: #ffff;
        }

        #nav-top {
            padding: 20px;
            border-bottom: 1px solid #7f7979;
            box-shadow: 2px 5px 2px #dcdcdc;
            background-color: #ffff;
        }

        #nav-top li a {
            font-size: 16x;
        }

        .nav-top__spanText {
            font-family: 'nav-top__SpanDestaque';
            font-size: 25px;
        }

        .navbar-brand {
            font-weight: bolder;
            color: #904713;
            border-bottom: 2px solid #904713;

        }


        .hero-main__content {
            padding: 20px;
            text-align: center;
            margin-top: 50px;
        }

        .hero-main__content p {
            font-size: 17px;
        }

        .hero-main__title {
            font-size: 50px;
            font-weight: bolder;
            margin-bottom: 20px;
        }

        .hero-main-content__input {
            display: flex;
            gap: 20px;
            justify-content: center;

        }

        .hero-main-content__input input {
            box-shadow: 2px 5px 2px #dcdcdc;
        }

        .hero-main-content__input button {
            width: 200px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #ff6a00, #c84a00);
            color: #fff;
            font-weight: bolder;
            transition: all 0.25s ease;
        }

        .hero-main-content__input button:hover {
            background: linear-gradient(135deg, #df540f, #c26a38);
            transform: scale(1.1);
        }


        .main__receitas {
            display: flex;
            justify-content: space-evenly;
            align-items: baseline;
            flex-wrap: wrap;
        }


        @font-face {
            font-family: 'nav-top__SpanDestaque';
            src: url(transfonter.org-20260305-203530/CreamCake-Bold.woff);
        }


        /* media queries*/

        /* X-Small devices (portrait phones, less than 576px)*/
        @media (max-width: 575.98px) {
            .main__receitas {
                flex-direction: column;
                align-items: center;
            }

            .main__receitas div {
                margin-top: 20px;
            }
        }

        /* Small devices (landscape phones, less than 768px)*/
        @media (max-width: 767.98px) {}

        /*Medium devices (tablets, less than 992px)*/
        @media (max-width: 991.98px) {}

        /* Large devices (desktops, less than 1200px)*/
        @media (max-width: 1199.98px) {}

        /* X-Large devices (large desktops, less than 1400px)*/
        @media (max-width: 1399.98px) {}
    </style>

</head>

<body>

    <header class="hero-main"> <!--hero-main-->


        <nav class="navbar navbar-expand-lg " id="nav-top"> <!--nav-top-->
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html"><img src="chapeu-de-chef.png" width="30px"
                        alt="chapeu de chef">
                    Delícias <span class="nav-top__spanText">do Sabor</span>

                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">

                            <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                        </li>

                    </ul>
                </div>
            </div>
        </nav><!--nav-top-->


        <div class="hero-main__content"> <!--hero-main__content-->

            <h1 class="hero-main__title">
                Receitas
            </h1>

            <p class="mt-3">Explore e experimente novos sabores!</p>

            <div class="hero-main-content__input">
                <input type="text" class="form-control w-50" placeholder="Buscar" id="inputBuscar">

                <button class="btnBuscar">Buscar</button>
            </div>





        </div><!--hero-main__content-->

        <hr>

    </header><!--hero-main-->



    <main class="main"> <!--main-->


        <section class="main__receitas"> <!--main__receitas-->





        </section><!--main__receitas-->

    </main><!--main-->


    <!-- scripts-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"
        defer></script>

    <script src="script.js"></script>
</body>

</html>
